# General
set -sg escape-time 0
set -g history-limit 50000
set -g display-time 4000
set -g base-index 1
set -wg pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g focus-events on
set -g set-clipboard on

# Show hostname for SSH windows, otherwise show the current command
set -g automatic-rename-format "#{?#{m/r:^ssh,#{pane_current_command}},#(echo '#{pane_title}' | sed 's/.*@//;s/ .*//;s/:.*//') 󰌘,#{pane_current_command}}"

# macOS doesn't have tmux-256color so check it exists first
if-shell "/usr/bin/infocmp -x tmux-256color > /dev/null 2>&1;" {
  set -g default-terminal tmux-256color
} {
  set -g default-terminal xterm-256color
}
if-shell "[ \"$COLORTERM\" = truecolor ] || [ \"$COLORTERM\" = 24bit ]" \
  'set -as terminal-overrides ",*:RGB"'

# Keybinds
set -wg mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel

unbind C-b
set -g prefix C-a
bind -r C-a send-prefix

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -n M-H resize-pane -L 5
bind -n M-J resize-pane -D 5
bind -n M-K resize-pane -U 5
bind -n M-L resize-pane -R 5
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Shift-enter for newlines
bind -n S-Enter send-keys Escape "[13;2u"

# Window switcher via fzf
bind f display-popup -E "tmux list-windows -F '#{window_index}:#{window_name}' | fzf --reverse | cut -d: -f1 | xargs -I{} tmux select-window -t {}"

bind R source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# Theme
set -g status-position top
set -g status 2
set -g status-format[1] ""
set -g status-style "bg=default,fg=default"
set -g status-left-length 40
set -g status-left "#[fg=black,bg=green,bold] #S #[bg=default] "
set -g status-right "#[fg=blue]#{?pane_in_mode,COPY ,}#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}#[fg=brightblack]#h "
set -g window-status-format "#[fg=brightblack] #I:#W "
set -g window-status-current-format "#[fg=default,bold] #I:#W "
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"
set -g message-style "bg=default,fg=blue"
set -g message-command-style "bg=default,fg=blue"
set -g mode-style "bg=blue,fg=black"
set -wg clock-mode-colour blue

# Local config
if-shell "[ -f ~/.tmux.conf.local ]" 'source ~/.tmux.conf.local'
